<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>500 — TCDA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; color: #fff; font-family: 'Inter', sans-serif; font-weight: 300; overflow: hidden; }

    @keyframes drape {
      0%   { transform: skewY(-1.5deg) translateY(0);    opacity: .18; }
      50%  { transform: skewY(1deg)    translateY(-12px); opacity: .26; }
      100% { transform: skewY(-1.5deg) translateY(0);    opacity: .18; }
    }
    .drape { position: fixed; inset: -20% -10%; background: repeating-linear-gradient(170deg, rgba(255,255,255,.04) 0px, rgba(255,255,255,.04) 1px, transparent 1px, transparent 60px); animation: drape 14s ease-in-out infinite; pointer-events: none; }

    @keyframes grain {
      0%, 100% { transform: translate(0,0); }
      10%  { transform: translate(-2%,-3%); } 20%  { transform: translate(3%,2%); }
      30%  { transform: translate(-1%,4%); } 40%  { transform: translate(4%,-1%); }
      50%  { transform: translate(-3%,3%); } 60%  { transform: translate(2%,-4%); }
      70%  { transform: translate(-4%,1%); } 80%  { transform: translate(1%,-2%); }
      90%  { transform: translate(3%,4%); }
    }
    .grain { position: fixed; inset: -50%; width: 200%; height: 200%; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E"); background-size: 200px 200px; animation: grain .8s steps(1) infinite; pointer-events: none; opacity: .5; }

    @keyframes lightwash {
      0%   { opacity: .0; transform: translateX(-30%) rotate(-8deg); }
      50%  { opacity: .07; }
      100% { opacity: .0; transform: translateX(60%) rotate(-8deg); }
    }
    .light-wash { position: fixed; inset: 0; background: linear-gradient(100deg, transparent 30%, rgba(255,255,255,.6) 50%, transparent 70%); width: 200%; animation: lightwash 9s ease-in-out infinite; pointer-events: none; }

    .page { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; text-align: center; }
    .logo { margin-bottom: 4rem; letter-spacing: .35em; font-size: 1rem; font-weight: 200; opacity: .55; text-transform: uppercase; }
    .eyebrow { font-size: .65rem; font-weight: 300; letter-spacing: .5em; text-transform: uppercase; color: rgba(255,255,255,.35); margin-bottom: 1.25rem; }
    h1 { font-size: clamp(1.75rem, 5vw, 3rem); font-weight: 200; letter-spacing: .04em; line-height: 1.15; margin-bottom: 1.25rem; }
    .desc { font-size: .8rem; font-weight: 300; letter-spacing: .08em; color: rgba(255,255,255,.4); margin-bottom: 3rem; line-height: 1.8; }
    .cta-wrap { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
    .cta, button.cta { display: inline-block; padding: .75rem 2.5rem; border: 1px solid rgba(255,255,255,.25); color: #fff; text-decoration: none; background: transparent; cursor: pointer; font-family: 'Inter', sans-serif; font-size: .7rem; font-weight: 300; letter-spacing: .3em; text-transform: uppercase; transition: border-color .3s, background .3s; }
    .cta:hover, button.cta:hover { border-color: rgba(255,255,255,.7); background: rgba(255,255,255,.06); }
    .sub-links { display: flex; gap: 2rem; margin-top: 1.5rem; }
    .sub-links a { font-size: .6rem; font-weight: 300; letter-spacing: .35em; text-transform: uppercase; color: rgba(255,255,255,.25); text-decoration: none; transition: color .3s; }
    .sub-links a:hover { color: rgba(255,255,255,.7); }
  </style>
</head>
<body>
  <div class="drape"></div>
  <div class="grain"></div>
  <div class="light-wash"></div>
  <div class="page">
    <div class="logo">
      <img src="/icons/tcda_logo.webp" alt="TCDA" style="height:32px;opacity:0.7;margin-bottom:8px;">
    </div>
    <p class="eyebrow">500</p>
    <h1>Something went wrong.</h1>
    <p class="desc">これはあなたのせいではありません。<br>サーバー側で問題が発生しました。</p>
    <div class="cta-wrap">
      <button class="cta" onclick="location.reload()">再読み込み</button>
    </div>
    <div class="sub-links">
      <a href="/">トップへ</a>
    </div>
  </div>
</body>
</html>
