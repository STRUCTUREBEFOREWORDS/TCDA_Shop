<!doctype html>
<html lang="en" dir="ltr" data-page-title-key="title_shop">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shop | TCDA</title>
    <meta name="description" content="Minimal luxury product grid by TCDA." />
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .product-modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,.6);
        z-index: 900;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        opacity: 0;
        pointer-events: none;
        transition: opacity 220ms ease;
      }
      .product-modal-overlay.is-open { opacity: 1; pointer-events: auto; }
      .product-modal {
        background: #fff;
        max-width: 900px;
        width: 100%;
        max-height: 90vh;
        overflow-y: auto;
        display: grid;
        grid-template-columns: 1fr 1fr;
        position: relative;
        transform: translateY(20px);
        transition: transform 220ms ease;
      }
      .product-modal-overlay.is-open .product-modal { transform: translateY(0); }
      .modal-gallery-wrap { display: flex; flex-direction: column; background: #f5f5f5; }
      .modal-hero-img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
      .modal-thumbs { display: flex; gap: 4px; padding: 4px; overflow-x: auto; background: #f0f0f0; }
      .modal-thumbs img { width: 64px; height: 64px; object-fit: cover; cursor: pointer; opacity: .55; transition: opacity 150ms; flex-shrink: 0; }
      .modal-thumbs img.active { opacity: 1; outline: 2px solid #000; outline-offset: -2px; }
      .modal-info { padding: 2rem 1.75rem; display: flex; flex-direction: column; gap: 1.25rem; }
      .modal-close { position: absolute; top: 1rem; right: 1rem; background: #000; color: #fff; border: none; width: 32px; height: 32px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; z-index: 10; }
      .modal-meta { font-size: .75rem; letter-spacing: .12em; opacity: .45; text-transform: uppercase; margin: 0; }
      .modal-name { font-size: 1.35rem; font-weight: 600; line-height: 1.25; margin: .25rem 0 0; }
      .modal-price { font-size: 1.1rem; font-weight: 500; margin: 0; }
      .modal-desc { font-size: .9rem; line-height: 1.7; opacity: .75; margin: 0; }
      .modal-material { font-size: .82rem; opacity: .55; margin: 0; }
      .modal-section-label { font-size: .75rem; letter-spacing: .1em; opacity: .45; text-transform: uppercase; margin: 0 0 .5rem; }
      .modal-size-table { width: 100%; border-collapse: collapse; font-size: .82rem; }
      .modal-size-table th, .modal-size-table td { border: 1px solid #e0e0e0; padding: .35rem .6rem; text-align: center; }
      .modal-size-table th { background: #f8f8f8; font-weight: 600; }
      .modal-sizes { display: flex; flex-wrap: wrap; gap: .5rem; }
      .modal-size-btn { border: 1px solid #d0d0d0; background: transparent; padding: .35rem .75rem; font-size: .82rem; cursor: pointer; transition: background 180ms, border-color 180ms; }
      .modal-size-btn[aria-pressed="true"], .modal-size-btn:hover { background: #000; color: #fff; border-color: #000; }
      .modal-buy-btn { width: 100%; background: #000; color: #fff; border: none; padding: .9rem; font-size: .9rem; letter-spacing: .08em; cursor: pointer; transition: opacity 220ms; }
      .modal-buy-btn:hover { opacity: .75; }
      @media (max-width: 640px) {
        .product-modal { grid-template-columns: 1fr; }
        .modal-gallery-wrap { max-height: 260px; }
      }
    </style>
  </head>

          <div class="locale-switcher" id="locale-switcher">
            <button class="locale-toggle" type="button" aria-haspopup="true" aria-expanded="false" data-locale-toggle>
              <span class="locale-toggle-lang" data-current-lang-label>EN</span>

            </button>
            <div class="locale-panel" role="dialog" aria-label="Language and currency" hidden data-locale-panel>
              <div class="locale-group">

                <div class="locale-btns">
                  <button type="button" class="locale-btn" data-lang-btn="en" aria-pressed="true">English</button>
                  <button type="button" class="locale-btn" data-lang-btn="zh" aria-pressed="false">中文</button>

                  <label class="filter-checkbox"><input type="checkbox" value="5000-15000" data-filter="price" /><span>¥5,000 – ¥15,000</span></label>

    <script>
    (function () {
      var allProducts = [];
      var sizeTemplates = {};
      var verifyCache = {};
      var currentProduct = null;
      var selectedSize = null;

      function getLang() {
        return (window.TCDAi18n && TCDAi18n.getCurrentLang) ? TCDAi18n.getCurrentLang() : "en";
      }
      function fmtPrice(jpy) {
        if (window.TCDACurrency && TCDACurrency.formatPrice && TCDACurrency.getCurrentCurrency) {
          return TCDACurrency.formatPrice(jpy, TCDACurrency.getCurrentCurrency());
        }
        return "¥" + Number(jpy).toLocaleString();
      }
      function esc(s) {
        return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
      }
      function nameFor(p) {
        var l = getLang();
        return typeof p.name === "object" ? (p.name[l] || p.name.en || "") : (p.name || "");
      }
      function descFor(p) {
        var l = getLang();
        return typeof p.description === "object" ? (p.description[l] || p.description.en || "") : (p.description || "");
      }
      function catLabel(c) { return {tshirt:"TOPS",outer:"OUTER",shoes:"SHOES"}[c] || c.toUpperCase(); }
      function segLabel(s) { return {mens:"Men's",womens:"Women's",unisex:"Unisex"}[s] || s; }
      function getSizes(p) {
        var tmpl = sizeTemplates[p.size_template];
        if (!tmpl) return [];
        return Object.keys(tmpl).map(function(sz) {
          return Object.assign({ size: sz }, tmpl[sz]);
        });
      }

      /* ── Printful verification ───────────────────────────── */
      function verify(printfulId) {
        if (verifyCache[printfulId] !== undefined) return Promise.resolve(verifyCache[printfulId]);
        return fetch("/api/verify?id=" + encodeURIComponent(printfulId))
          .then(function(r){ return r.ok ? r.json() : {valid:false}; })
          .then(function(d){ verifyCache[printfulId] = d.valid !== false; return verifyCache[printfulId]; })
          .catch(function(){ verifyCache[printfulId] = false; return false; });
      }

      /* ── Card rendering ──────────────────────────────────── */
      function makeCard(p) {
        var img = (p.images && p.images[0]) || "images/product-prism-shirt.webp";
        var a = document.createElement("article");
        a.className = "card";
        a.dataset.productId = p.id;
        a.dataset.category  = p.category || "";
        a.dataset.segment   = p.segment  || "";
        a.dataset.priceJpy  = p.price    || 0;
        a.innerHTML = [
          '<div class="media" style="cursor:pointer">',
          '  <img src="' + esc(img) + '" alt="' + esc(nameFor(p)) + '" loading="lazy" decoding="async" />',
          '</div>',
          '<div class="card-body">',
          '  <p class="meta">' + esc(catLabel(p.category)) + ' · ' + esc(segLabel(p.segment)) + '</p>',
          '  <h3>' + esc(nameFor(p)) + '</h3>',
          '  <p class="price" data-price-jpy="' + p.price + '">' + fmtPrice(p.price) + '</p>',
          '</div>',
          '<div class="card-buy">',
          '  <button class="btn card-quick-add" type="button">View Details</button>',
          '</div>',
        ].join("");
        a.querySelector(".media").addEventListener("click", function(){ openModal(p); });
        a.querySelector(".card-quick-add").addEventListener("click", function(){ openModal(p); });
        return a;
      }

      function renderGrid(list) {
        var grid = document.getElementById("shop-grid");
        var loading = document.getElementById("shop-loading");
        if (loading) loading.remove();
        grid.innerHTML = "";
        if (!list.length) {
          grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;opacity:.4;padding:3rem">No products found.</p>';
          return;
        }
        var frag = document.createDocumentFragment();
        list.forEach(function(p){ frag.appendChild(makeCard(p)); });
        grid.appendChild(frag);
        if (window.TCDACurrency && TCDACurrency.applyPrices) {
          TCDACurrency.applyPrices(TCDACurrency.getCurrentCurrency ? TCDACurrency.getCurrentCurrency() : "JPY");
        }
      }

      /* ── Filter + Sort ───────────────────────────────────── */
      function applyFilters() {
        var q   = (document.getElementById("shop-search").value || "").toLowerCase();
        var srt = document.getElementById("shop-sort").value;
        var cats = [], prices = [], segs = [];
        document.querySelectorAll("[data-filter]").forEach(function(cb){
          if (!cb.checked) return;
          var t = cb.dataset.filter, v = cb.value;
          if (t === "category") cats.push(v);
          else if (t === "price") prices.push(v);
          else if (t === "segment") segs.push(v);
        });

        var list = allProducts.filter(function(p){
          if (q) {
            var n = (nameFor(p) + " " + (typeof p.name === "object" ? (p.name.ja||"") : "")).toLowerCase();
            if (!n.includes(q)) return false;
          }
          if (cats.length && !cats.includes(p.category)) return false;
          if (segs.length && !segs.includes(p.segment))  return false;
          if (prices.length) {
            var pr = p.price;
            if (!prices.some(function(r){
              if (r==="0-5000")      return pr <= 5000;
              if (r==="5000-15000")  return pr > 5000  && pr <= 15000;
              if (r==="15000-50000") return pr > 15000 && pr <= 50000;
              if (r==="50000+")      return pr > 50000;
            })) return false;
          }
          return true;
        });

        if (srt === "price-low")  list.sort(function(a,b){ return a.price - b.price; });
        if (srt === "price-high") list.sort(function(a,b){ return b.price - a.price; });
        renderGrid(list);
      }

      /* ── Modal ───────────────────────────────────────────── */
      function openModal(p) {
        currentProduct = p;
        var imgs = p.images && p.images.length ? p.images : ["images/product-prism-shirt.webp"];

        document.getElementById("modal-name").textContent     = nameFor(p);
        document.getElementById("modal-meta").textContent     = catLabel(p.category) + " · " + segLabel(p.segment);
        document.getElementById("modal-price").textContent    = fmtPrice(p.price);
        document.getElementById("modal-desc").textContent     = descFor(p);
        document.getElementById("modal-material").textContent = "Material: " + (p.material || "—");

        var hero = document.getElementById("modal-hero");
        hero.src = imgs[0];
        hero.alt = nameFor(p);

        var thumbs = document.getElementById("modal-thumbs");
        thumbs.innerHTML = "";
        imgs.forEach(function(src, i){
          var img = document.createElement("img");
          img.src = src;
          img.alt = nameFor(p) + " " + (i+1);
          if (i === 0) img.classList.add("active");
          img.addEventListener("click", function(){
            hero.src = src;
            thumbs.querySelectorAll("img").forEach(function(t){ t.classList.remove("active"); });
            img.classList.add("active");
          });
          thumbs.appendChild(img);
        });

        var sizes = getSizes(p);
        var sizesEl = document.getElementById("modal-sizes");
        sizesEl.innerHTML = "";
        selectedSize = sizes[0] ? sizes[0].size : null;
        sizes.forEach(function(s, i){
          var btn = document.createElement("button");
          btn.className = "modal-size-btn";
          btn.type = "button";
          btn.textContent = s.size;
          btn.setAttribute("aria-pressed", i === 0 ? "true" : "false");
          btn.addEventListener("click", function(){
            sizesEl.querySelectorAll(".modal-size-btn").forEach(function(b){ b.setAttribute("aria-pressed","false"); });
            btn.setAttribute("aria-pressed","true");
            selectedSize = s.size;
          });
          sizesEl.appendChild(btn);
        });

        var thead = document.getElementById("modal-table-head");
        var tbody = document.getElementById("modal-table-body");
        var COL_LABELS = {chest:"胸囲 (cm)",length:"着丈 (cm)",sleeve:"袖丈 (cm)",foot_length:"足長 (cm)"};
        if (sizes.length) {
          var cols = Object.keys(sizes[0]).filter(function(k){ return k !== "size"; });
          thead.innerHTML = "<tr><th>Size</th>" + cols.map(function(c){ return "<th>" + (COL_LABELS[c]||c) + "</th>"; }).join("") + "</tr>";
          tbody.innerHTML = sizes.map(function(s){
            return "<tr><td>" + esc(s.size) + "</td>" + cols.map(function(c){ return "<td>" + (s[c]!=null?s[c]:"—") + "</td>"; }).join("") + "</tr>";
          }).join("");
        } else {
          thead.innerHTML = "";
          tbody.innerHTML = '<tr><td style="opacity:.4">—</td></tr>';
        }

        var overlay = document.getElementById("product-modal");
        overlay.removeAttribute("hidden");
        requestAnimationFrame(function(){ overlay.classList.add("is-open"); });
        document.body.style.overflow = "hidden";
      }

      function closeModal() {
        var overlay = document.getElementById("product-modal");
        overlay.classList.remove("is-open");
        overlay.addEventListener("transitionend", function h(){
          overlay.setAttribute("hidden","");
          overlay.removeEventListener("transitionend",h);
        });
        document.body.style.overflow = "";
      }

      /* ── Events ──────────────────────────────────────────── */
      function wireEvents() {
        document.getElementById("modal-close").addEventListener("click", closeModal);
        document.getElementById("product-modal").addEventListener("click", function(e){ if(e.target===this) closeModal(); });
        document.addEventListener("keydown", function(e){ if(e.key==="Escape") closeModal(); });

        document.getElementById("shop-search").addEventListener("input", applyFilters);
        document.getElementById("shop-sort").addEventListener("change", applyFilters);
        document.querySelectorAll("[data-filter]").forEach(function(cb){ cb.addEventListener("change", applyFilters); });
        document.querySelector(".filter-reset").addEventListener("click", function(){
          document.querySelectorAll("[data-filter]").forEach(function(cb){ cb.checked=false; });
          document.getElementById("shop-search").value = "";
          applyFilters();
        });

        document.getElementById("modal-buy").addEventListener("click", function(){
          if (!currentProduct || !selectedSize) return;
          var name = nameFor(currentProduct) + " (" + selectedSize + ")";
          if (window.TCDACart && TCDACart.addItem) {
            TCDACart.addItem({ id: currentProduct.id+"-"+selectedSize, name: name, price: currentProduct.price });
          }
          closeModal();
        });

        document.addEventListener("tcda:currency:changed", function(){
          document.querySelectorAll("[data-price-jpy]").forEach(function(el){
            var jpy = parseInt(el.dataset.priceJpy, 10);
            if (!isNaN(jpy)) el.textContent = fmtPrice(jpy);
          });
          if (currentProduct) document.getElementById("modal-price").textContent = fmtPrice(currentProduct.price);
        });
      }

      /* ── Bootstrap ───────────────────────────────────────── */
      document.addEventListener("DOMContentLoaded", function(){
        wireEvents();

        // Fetch products.json, sizeTemplates.json and live Printful prices in parallel
        Promise.all([
          fetch("data/products.json").then(function(r){ return r.ok ? r.json() : Promise.reject("HTTP " + r.status); }),
          fetch("data/sizeTemplates.json").then(function(r){ return r.ok ? r.json() : {}; }).catch(function(){ return {}; }),
          fetch("/api/prices").then(function(r){ return r.ok ? r.json() : null; }).catch(function(){ return null; })
        ])
          .then(function(triple){
            var data     = triple[0];
            sizeTemplates = triple[1];
            var liveData = triple[2];
            var products = data.products || [];

            // Patch prices from Printful if live data available
            if (liveData && liveData.prices) {
              products.forEach(function(p){
                var live = liveData.prices[p.printful_id];
                if (live && live.price) p.price = live.price;
              });
            }

            var checks = products.map(function(p){
              return verify(p.printful_id).then(function(ok){ return ok ? p : null; });
            });
            return Promise.all(checks);
          })
          .then(function(results){
            allProducts = results.filter(Boolean);
            if (!allProducts.length) {
              // verify endpoint not configured — show all with current prices
              return fetch("data/products.json")
                .then(function(r){ return r.json(); })
                .then(function(d){ allProducts = d.products || []; renderGrid(allProducts); });
            }
            renderGrid(allProducts);
          })
          .catch(function(err){
            console.warn("[Shop] load failed:", err);
            var loading = document.getElementById("shop-loading");
            if (loading) loading.textContent = "Failed to load products.";
          });
      });
    })();
    </script>
  </body>
</html>
