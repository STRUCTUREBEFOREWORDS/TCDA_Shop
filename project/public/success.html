<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TCDA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#000;color:#fff;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:32px}
.msg{font-size:clamp(.85rem,2.4vw,1.1rem);letter-spacing:.32em;font-weight:300;opacity:0;animation:fd 1.4s ease forwards .5s}
a{font-size:.62rem;letter-spacing:.28em;color:#fff;opacity:0;text-decoration:none;animation:fd 1.4s ease forwards 1.2s;transition:opacity .4s ease}
a:hover{opacity:.9!important}
@keyframes fd{to{opacity:.8}}
</style>
</head>
<body>
<span class="msg">選択は完了した</span>
<a href="/">—</a>
</body>
</html>
