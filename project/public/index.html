<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TCDA</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{overflow-x:hidden}
body{background:#000;color:#fff;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;min-height:100vh}

#entry{position:fixed;inset:0;background:#000;z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity .65s ease}
#entry span{font-size:clamp(.85rem,2.4vw,1.1rem);letter-spacing:.32em;font-weight:300;opacity:.9}

#ambient{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
#ambient img{position:absolute;object-fit:cover}

#main{position:relative;z-index:1;opacity:0;transition:opacity 1s ease;padding:64px 32px 128px}
#main.show{opacity:1}

#grid{display:grid;grid-template-columns:1fr;gap:64px;max-width:1100px;margin:0 auto}
@media(min-width:768px){#grid{grid-template-columns:1fr 1fr;gap:80px 48px}}

.product{display:flex;flex-direction:column;gap:16px;transition:transform .6s ease,opacity .6s ease}
.product img{width:100%;aspect-ratio:1;object-fit:cover;display:block;transition:opacity .5s ease}
.product img:hover{opacity:.78}
.tags{display:flex;gap:16px;font-size:.68rem;letter-spacing:.22em;opacity:.38}
.choose{font-size:.7rem;letter-spacing:.32em;color:#fff;opacity:.22;cursor:pointer;transition:opacity .45s ease;user-select:none;display:inline-block;padding:4px 0}
.choose:hover{opacity:.95}

@keyframes fl{0%,100%{transform:translateY(0);opacity:1}50%{transform:translateY(-10px);opacity:.7}}
@keyframes fl3{0%,100%{transform:translateY(0) scale(1);opacity:1}38%{transform:translateY(-14px) scale(1.03);opacity:.76}72%{transform:translateY(7px) scale(.97);opacity:.88}}
@keyframes hu{from{filter:hue-rotate(0deg)}to{filter:hue-rotate(360deg)}}

body.phase-2 .product img{animation:fl 7s ease-in-out infinite}
body.phase-2 .product:nth-child(even) img{animation-delay:-3.5s}

body.phase-3{animation:hu 20s linear infinite}
body.phase-3 .product img{animation:fl3 5s ease-in-out infinite}
body.phase-3 .product:nth-child(3n) img{animation-delay:-1.8s}
body.phase-3 .product:nth-child(3n+2) img{animation-delay:-3.6s}
</style>
</head>
<body>

<div id="entry"><span>これは服ではない</span></div>
<div id="ambient"></div>
<div id="main"><div id="grid"></div></div>

<script>
const TAGS=[["覚醒","再生"],["静寂","深層"],["衝動","解放"],["境界","消失"],["均衡","歪み"]];
const IMG_PATH="/images/サイト全体用/",IMG_PREFIX="img1-";

const vc=parseInt(localStorage.getItem('tcda-vc')||'0')+1;
localStorage.setItem('tcda-vc',vc);
const phase=vc>=3?3:vc;
document.body.classList.add('phase-'+phase);

setTimeout(()=>{
  const e=document.getElementById('entry');
  e.style.opacity='0';
  setTimeout(()=>{e.remove();document.getElementById('main').classList.add('show');},650);
},1200);

function rnd(a,b){return Math.random()*(b-a)+a;}

async function initAmbient(){
  let count=0;
  try{const r=await fetch('/api/ambient-count');count=(await r.json()).count||0;}catch{}
  if(!count)return;
  const amb=document.getElementById('ambient');
  const dur=phase===3?3:phase===2?5:9;
  const N=Math.min(count,11);
  const srcs=Array.from({length:count},(_,i)=>IMG_PATH+IMG_PREFIX+String(i+1).padStart(3,'0')+'.webp');
  const shuffled=[...srcs].sort(()=>Math.random()-.5);
  const els=[];

  function anim(el){
    if(phase===1){
      el.style.transform=`translate(${rnd(-3,3)}%,${rnd(-2,2)}%)`;
      el.style.opacity=rnd(.04,.09);
    }else if(phase===2){
      el.style.transform=`translate(${rnd(-9,9)}%,${rnd(-5,5)}%) scale(${rnd(.94,1.06)})`;
      el.style.opacity=rnd(.06,.15);
    }else{
      el.style.transform=`translate(${rnd(-22,22)}%,${rnd(-12,12)}%) scale(${rnd(.78,1.28)})`;
      el.style.opacity=rnd(.08,.24);
    }
  }

  for(let i=0;i<N;i++){
    const img=document.createElement('img');
    img.loading='lazy';img.decoding='async';
    const w=rnd(10,phase===3?38:28);
    img.style.cssText=`width:${w}vw;left:${rnd(-5,92)}vw;top:${rnd(-5,92)}vh;opacity:0;filter:blur(${rnd(0,phase===3?5:3)}px);transition:transform ${dur}s ease,opacity ${dur}s ease;`;
    amb.appendChild(img);els.push(img);
    img.src=shuffled[i%shuffled.length];
    img.onload=()=>requestAnimationFrame(()=>anim(img));
  }

  setInterval(()=>els.forEach(el=>{if(Math.random()<.65)anim(el);}),dur*1000);
}

initAmbient();

fetch('/api/products').then(r=>r.json()).then(({products})=>{
  const grid=document.getElementById('grid');
  if(phase===3)grid.style.display='block';

  products.forEach((p,i)=>{
    const tag=TAGS[i%TAGS.length];
    const art=document.createElement('article');
    art.className='product';

    if(phase===3){
      art.style.cssText=`width:${rnd(34,56)}vw;max-width:560px;margin-left:${rnd(0,42)}vw;margin-bottom:${rnd(32,96)}px;transform:rotate(${rnd(-2,2)}deg);`;
    }

    const img=document.createElement('img');
    img.src=p.thumbnail_url;img.alt='';img.loading='lazy';img.decoding='async';

    const tagsEl=document.createElement('div');
    tagsEl.className='tags';
    tagsEl.innerHTML=`<span>${tag[0]}</span><span>${tag[1]}</span>`;

    const choose=document.createElement('span');
    choose.className='choose';
    choose.textContent='これを選ぶ';
    choose.onclick=async()=>{
      choose.style.pointerEvents='none';choose.style.opacity='.08';
      try{
        const r=await fetch('/create-checkout-session',{method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({price:p.price,variant_id:p.variant_id,tag:tag.join(' / ')})});
        const{url}=await r.json();
        if(url)location.href=url;
      }catch{choose.style.pointerEvents='';choose.style.opacity='.22';}
    };

    art.append(img,tagsEl,choose);
    grid.appendChild(art);
  });
});
</script>
</body>
</html>
