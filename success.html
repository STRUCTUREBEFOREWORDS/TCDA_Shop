<!doctype html>
<html lang="ja" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ご注文ありがとうございます | TCDA</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="nav-wrap">
        <a class="brand" href="index.html" aria-label="TCDA Home"><img src="images/brand-logo.jpg" alt="TCDA logo" class="brand-logo" /></a>
        <nav class="nav-links" aria-label="Main navigation">
          <a href="index.html">Home</a>
          <a href="shop.html">Shop</a>
        </nav>
        <div class="nav-tools">
          <div class="cart-pill"><span>Cart</span> <span data-cart-count>0</span></div>
        </div>
      </div>
    </header>

    <main class="page">
      <section class="section" style="padding-top: clamp(6rem, 12vw, 10rem); text-align: center">
        <div class="container" style="max-width: 640px" data-reveal>
          <p style="font-size: 3rem; margin-bottom: var(--s2)">✓</p>
          <p class="eyebrow" style="margin-bottom: var(--s2)">Order Complete</p>
          <h1 style="font-size: clamp(2rem, 5vw, 3.5rem)">ご注文ありがとうございます</h1>
          <p class="lead" style="max-width: 48ch; margin: var(--s3) auto 0">
            ご注文が確定しました。確認メールをご登録のアドレスへお送りします。<br />
            発送まで7〜14営業日お待ちください。
          </p>
          <div style="display:flex; gap:var(--s2); justify-content:center; flex-wrap:wrap; margin-top:var(--s4)">
            <a href="shop.html" class="btn">Shop へ戻る</a>
            <a href="index.html" class="btn-ghost">Home へ</a>
          </div>
          <p style="margin-top:var(--s4); font-size:0.78rem; color:var(--muted)">
            ご不明な点は <a href="mailto:info@tcda.shop">info@tcda.shop</a> までご連絡ください。
          </p>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-wrap">
        <p>Transcend Color Digital Apparel（TCDA）</p>
        <p><a href="legal.html">特商法表記</a> / <a href="mailto:info@tcda.shop">Contact</a></p>
      </div>
    </footer>

    <script src="js/cart.js" defer></script>
  </body>
</html>
