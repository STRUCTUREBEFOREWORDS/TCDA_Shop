<!doctype html>
<html lang="ja" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shop | TCDA</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/shop-art.css" />
    <style>
      .gallery-wrap {
        max-width: 1200px;
        margin: 0 auto;
        padding: 7rem 2rem 10rem;
      }
      .gallery-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 40px;
      }
      .gallery-item {
        display: block;
        text-decoration: none;
        cursor: pointer;
      }
      .gallery-item img {
        width: 100%;
        display: block;
        aspect-ratio: 3 / 4;
        object-fit: cover;
        transition: opacity 320ms ease, transform 320ms ease;
      }
      .gallery-item:hover img {
        opacity: 0.82;
        transform: scale(1.022);
      }
      .item-id {
        display: block;
        margin-top: 0.8rem;
        font-size: 0.6rem;
        letter-spacing: 0.26em;
        color: rgba(240,237,232,0.32);
        text-transform: uppercase;
        font-family: inherit;
      }
      .gallery-status {
        grid-column: 1 / -1;
        text-align: center;
        padding: 6rem 0;
        font-size: 0.65rem;
        letter-spacing: 0.22em;
        color: rgba(240,237,232,0.25);
        text-transform: uppercase;
      }
      @media (max-width: 960px) {
        .gallery-grid { grid-template-columns: repeat(3, 1fr); gap: 28px; }
      }
      @media (max-width: 600px) {
        .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
        .gallery-wrap  { padding: 5rem 1rem 7rem; }
      }
    </style>
  </head>
  <body class="page-art">
    <div class="art-bg" aria-hidden="true"></div>
    <div class="art-vignette" aria-hidden="true"></div>

    <header class="site-header">
      <div class="nav-wrap">
        <a class="brand" href="index.html" aria-label="TCDA Home">
          <img src="images/logo/tcda_black.svg" alt="TCDA" class="brand-logo" width="160" height="48" />
        </a>
        <button class="nav-toggle" type="button" aria-expanded="false" data-nav-toggle>Menu</button>
        <nav class="nav-links" aria-label="Main navigation">
          <a href="index.html">Home</a>
          <a href="about.html">Brand</a>
          <a href="collection.html">Collection</a>
          <a href="archive.html">Archive</a>
          <a href="shop.html" aria-current="page">Shop</a>
        </nav>
        <div class="nav-tools">
          <div class="locale-switcher" id="locale-switcher">
            <button class="locale-toggle" type="button" aria-haspopup="true" aria-expanded="false" data-locale-toggle>
              <span id="label-lang">JA</span>
              <span class="locale-toggle-sep">·</span>
              <span id="label-currency">JPY</span>
            </button>
            <div class="locale-panel" role="dialog" hidden data-locale-panel>
              <div class="locale-group">
                <p class="locale-group-label">Language</p>
                <div class="locale-btns">
                  <button type="button" class="locale-btn" data-lang-btn="ja">日本語</button>
                  <button type="button" class="locale-btn" data-lang-btn="en">English</button>
                  <button type="button" class="locale-btn" data-lang-btn="ko">한국어</button>
                  <button type="button" class="locale-btn" data-lang-btn="zh-hans">中文</button>
                  <button type="button" class="locale-btn" data-lang-btn="es">Español</button>
                  <button type="button" class="locale-btn" data-lang-btn="fr">Français</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main>
      <div class="gallery-wrap">
        <div class="gallery-grid" id="gallery-grid">
          <p class="gallery-status" id="gallery-status">—</p>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="footer-wrap">
        <p>Transcend Color Digital Apparel（TCDA）</p>
        <p>
          <a href="about.html">About</a> /
          <a href="shop.html">Shop</a> /
          <a href="legal.html">特商法</a>
        </p>
        <p>Contact：info@tcda.shop</p>
      </div>
    </footer>

    <script src="js/script.js" defer></script>
    <script>
    (function () {
      "use strict";

      var API        = "https://tcda-worker.patient-bush-5f73.workers.dev";
      var CATEGORIES = ["tshirt", "outer"];

      var lang = (function () {
        try { return localStorage.getItem("tcda-lang-v1") || "ja"; } catch (e) { return "ja"; }
      })();

      function nameFor(p) {
        if (typeof p.name === "object") return p.name[lang] || p.name.en || p.name.ja || "";
        return p.name || "";
      }

      function pad(n) { return n < 10 ? "0" + n : String(n); }

      function esc(s) {
        return String(s || "")
          .replace(/&/g, "&amp;").replace(/</g, "&lt;")
          .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
      }

      function renderGallery(products) {
        var grid   = document.getElementById("gallery-grid");
        var status = document.getElementById("gallery-status");
        if (status) status.remove();
        grid.innerHTML = "";

        if (!products.length) {
          grid.innerHTML = '<p class="gallery-status">—</p>';
          return;
        }

        var frag = document.createDocumentFragment();
        products.forEach(function (p, i) {
          var img  = (p.images && p.images[0]) || "";
          var link = "product.html?id=" + encodeURIComponent(p.id);
          var a    = document.createElement("a");
          a.className = "gallery-item";
          a.href      = link;
          a.innerHTML =
            '<img src="' + esc(img) + '" alt="' + esc(nameFor(p)) + '" loading="eager" decoding="async" />' +
            '<span class="item-id">NO.' + pad(i + 1) + '</span>';
          frag.appendChild(a);
        });
        grid.appendChild(frag);
      }

      /* locale toggle */
      document.addEventListener("DOMContentLoaded", function () {
        var lt = document.querySelector("[data-locale-toggle]");
        var lp = document.querySelector("[data-locale-panel]");
        if (lt && lp) {
          lt.addEventListener("click", function (e) {
            e.stopPropagation();
            var open = !lp.hidden;
            lp.hidden = open;
            lt.setAttribute("aria-expanded", String(!open));
          });
          document.addEventListener("click", function () { lp.hidden = true; lt.setAttribute("aria-expanded", "false"); });
          lp.addEventListener("click", function (e) { e.stopPropagation(); });
        }

        document.querySelectorAll("[data-lang-btn]").forEach(function (btn) {
          btn.addEventListener("click", function () {
            lang = this.dataset.langBtn;
            try { localStorage.setItem("tcda-lang-v1", lang); } catch (e) {}
            document.getElementById("label-lang").textContent = lang.toUpperCase();
            /* 再描画 */
            document.querySelectorAll(".gallery-item img").forEach(function (img) {
              var id = img.parentElement.href.split("id=")[1];
              /* name は再fetchせず既データから */
            });
          });
        });

        fetch(API + "/api/printful-sync").catch(function () {});

        fetch(API + "/api/products?ts=" + Date.now())
          .then(function (r) {
            if (!r.ok) throw new Error("HTTP " + r.status);
            return r.json();
          })
          .then(function (data) {
            var products = (data.products || []).filter(function (p) {
              return CATEGORIES.indexOf(p.category) !== -1;
            });
            renderGallery(products);
          })
          .catch(function (err) {
            console.error("[Shop]", err);
            var s = document.getElementById("gallery-status");
            if (s) s.textContent = err.message;
          });
      });
    })();
    </script>
  </body>
</html>
