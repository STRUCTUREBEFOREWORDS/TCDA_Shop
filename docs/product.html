<!doctype html>
<html lang="ja" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Product | TCDA</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/shop-art.css" />
    <style>
      /* ── Layout ───────────────────────────────────────────── */
      .product-wrap {
        max-width: 960px;
        margin: 0 auto;
        padding: 6rem 2rem 10rem;
      }
      .product-back {
        display: inline-block;
        font-size: 0.6rem;
        letter-spacing: 0.24em;
        color: rgba(240,237,232,0.28);
        text-decoration: none;
        text-transform: uppercase;
        margin-bottom: 3.5rem;
        transition: color 200ms;
      }
      .product-back:hover { color: rgba(240,237,232,0.7); }

      /* ── Hero image ───────────────────────────────────────── */
      .product-img-wrap {
        width: 100%;
        max-width: 560px;
        margin: 0 auto 4rem;
      }
      .product-img-wrap img {
        width: 100%;
        display: block;
        aspect-ratio: 1 / 1;
        object-fit: cover;
      }
      .product-thumbs {
        display: flex;
        gap: 8px;
        margin-top: 8px;
        justify-content: center;
      }
      .product-thumbs img {
        width: 56px;
        height: 56px;
        object-fit: cover;
        cursor: pointer;
        opacity: 0.45;
        transition: opacity 160ms;
        flex-shrink: 0;
      }
      .product-thumbs img.active { opacity: 1; outline: 1px solid rgba(240,237,232,0.6); }

      /* ── Info block ───────────────────────────────────────── */
      .product-info {
        max-width: 480px;
        margin: 0 auto;
        text-align: center;
        display: flex;
        flex-direction: column;
        gap: 2rem;
      }
      .product-name {
        font-size: clamp(1.2rem, 3vw, 1.75rem);
        font-weight: 400;
        letter-spacing: 0.08em;
        color: rgba(240,237,232,0.9);
        margin: 0;
        line-height: 1.3;
      }
      .product-concept {
        font-size: 0.82rem;
        line-height: 1.8;
        color: rgba(200,192,182,0.62);
        letter-spacing: 0.06em;
        margin: 0;
        max-width: 36ch;
        margin-left: auto;
        margin-right: auto;
      }
      .product-meta-row {
        display: flex;
        justify-content: center;
        gap: 2.5rem;
        font-size: 0.65rem;
        letter-spacing: 0.18em;
        color: rgba(200,192,182,0.42);
        text-transform: uppercase;
      }

      /* ── Size ─────────────────────────────────────────────── */
      .size-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        justify-content: center;
      }
      .size-opt {
        border: 1px solid rgba(240,237,232,0.15);
        background: transparent;
        color: rgba(240,237,232,0.55);
        padding: 0.4rem 0.9rem;
        font-size: 0.65rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        cursor: pointer;
        font-family: inherit;
        transition: border-color 180ms, color 180ms, background 180ms;
      }
      .size-opt[aria-pressed="true"],
      .size-opt:hover {
        border-color: rgba(240,237,232,0.7);
        color: rgba(240,237,232,0.95);
        background: rgba(240,237,232,0.06);
      }

      /* ── Price ────────────────────────────────────────────── */
      .product-price {
        font-size: 1.1rem;
        font-weight: 300;
        letter-spacing: 0.1em;
        color: rgba(240,237,232,0.75);
        margin: 0;
      }

      /* ── Buy Now ──────────────────────────────────────────── */
      .buy-now-btn {
        display: block;
        width: 100%;
        max-width: 320px;
        margin: 0 auto;
        background: rgba(240,237,232,0.96);
        color: #0a0a0a;
        border: none;
        padding: 1.1rem 2rem;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        font-family: inherit;
        cursor: pointer;
        transition: opacity 200ms;
      }
      .buy-now-btn:hover  { opacity: 0.82; }
      .buy-now-btn:disabled { opacity: 0.4; cursor: wait; }

      /* ── States ───────────────────────────────────────────── */
      #product-loading {
        text-align: center;
        padding: 8rem 0;
        font-size: 0.6rem;
        letter-spacing: 0.22em;
        color: rgba(240,237,232,0.22);
        text-transform: uppercase;
      }
      #product-error {
        text-align: center;
        padding: 6rem 0;
        font-size: 0.75rem;
        color: rgba(200,100,100,0.7);
        letter-spacing: 0.08em;
      }

      @media (max-width: 600px) {
        .product-wrap { padding: 4rem 1rem 8rem; }
        .product-img-wrap { max-width: 100%; }
      }
    </style>
  </head>
  <body class="page-art">
    <div class="art-bg" aria-hidden="true"></div>
    <div class="art-vignette" aria-hidden="true"></div>

    <header class="site-header">
      <div class="nav-wrap">
        <a class="brand" href="index.html" aria-label="TCDA Home">
          <img src="images/logo/tcda_black.svg" alt="TCDA" class="brand-logo" width="160" height="48" />
        </a>
        <button class="nav-toggle" type="button" aria-expanded="false" data-nav-toggle>Menu</button>
        <nav class="nav-links" aria-label="Main navigation">
          <a href="index.html">Home</a>
          <a href="about.html">Brand</a>
          <a href="collection.html">Collection</a>
          <a href="archive.html">Archive</a>
          <a href="shop.html">Shop</a>
        </nav>
        <div class="nav-tools">
          <div class="locale-switcher" id="locale-switcher">
            <button class="locale-toggle" type="button" aria-haspopup="true" aria-expanded="false" data-locale-toggle>
              <span id="label-lang">JA</span>
              <span class="locale-toggle-sep">·</span>
              <span id="label-currency">JPY</span>
            </button>
            <div class="locale-panel" role="dialog" hidden data-locale-panel>
              <div class="locale-group">
                <p class="locale-group-label">Language</p>
                <div class="locale-btns">
                  <button type="button" class="locale-btn" data-lang-btn="ja">日本語</button>
                  <button type="button" class="locale-btn" data-lang-btn="en">English</button>
                  <button type="button" class="locale-btn" data-lang-btn="ko">한국어</button>
                  <button type="button" class="locale-btn" data-lang-btn="zh-hans">中文</button>
                  <button type="button" class="locale-btn" data-lang-btn="es">Español</button>
                  <button type="button" class="locale-btn" data-lang-btn="fr">Français</button>
                </div>
              </div>
              <div class="locale-group">
                <p class="locale-group-label">Currency</p>
                <select class="currency-select" id="currency-select"></select>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main>
      <div class="product-wrap">
        <a class="product-back" href="shop.html" id="back-link">← Shop</a>
        <div id="product-loading">—</div>
        <div id="product-error" hidden></div>
        <div id="product-content" hidden>
          <div class="product-img-wrap">
            <img id="product-hero" src="" alt="" loading="eager" decoding="async" />
            <div class="product-thumbs" id="product-thumbs"></div>
          </div>
          <div class="product-info">
            <h1 class="product-name" id="product-name"></h1>
            <p class="product-concept" id="product-concept"></p>
            <div class="product-meta-row">
              <span id="product-material"></span>
              <span id="product-category"></span>
            </div>
            <div class="size-row" id="size-row"></div>
            <p class="product-price" id="product-price"></p>
            <button class="buy-now-btn" id="buy-btn" type="button">Buy Now</button>
          </div>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="footer-wrap">
        <p>Transcend Color Digital Apparel（TCDA）</p>
        <p><a href="about.html">About</a> / <a href="shop.html">Shop</a> / <a href="legal.html">特商法</a></p>
        <p>Contact：info@tcda.shop</p>
      </div>
    </footer>

    <script src="js/script.js" defer></script>
    <script>
    (function () {
      "use strict";

      var API = "https://tcda-worker.patient-bush-5f73.workers.dev";

      var ZERO_DECIMAL = {JPY:1,KRW:1,BIF:1,CLP:1,DJF:1,GNF:1,ISK:1,KMF:1,MGA:1,PYG:1,RWF:1,UGX:1,VND:1,VUV:1,XAF:1,XOF:1,XPF:1};
      var CUR_SYMBOLS  = {JPY:"¥",USD:"$",EUR:"€",GBP:"£",AUD:"A$",CAD:"C$",SGD:"S$",HKD:"HK$",CNY:"¥",KRW:"₩",CHF:"Fr",SEK:"kr",NOK:"kr",DKK:"kr",NZD:"NZ$",MXN:"$",BRL:"R$",INR:"₹",THB:"฿",MYR:"RM",PHP:"₱",IDR:"Rp",TWD:"NT$",ZAR:"R",AED:"د.إ",SAR:"﷼",TRY:"₺",CZK:"Kč",PLN:"zł",HUF:"Ft"};

      var state = {
        lang:     (function(){ try{ return localStorage.getItem("tcda-lang-v1")||"ja"; }catch(e){ return "ja"; } })(),
        currency: (function(){ try{ return localStorage.getItem("tcda-currency-v1")||"JPY"; }catch(e){ return "JPY"; } })()
      };

      var fxRates       = {};
      var sizeTemplates = {};
      var currentProduct = null;
      var selectedSize   = null;

      function nameFor(p) {
        if (typeof p.name === "object") return p.name[state.lang] || p.name.en || p.name.ja || "";
        return p.name || "";
      }
      function descFor(p) {
        if (typeof p.description === "object") return p.description[state.lang] || p.description.en || p.description.ja || "";
        return p.description || "";
      }
      function getRate(c) { return fxRates[c] !== undefined ? fxRates[c] : (c === "JPY" ? 1 : 1); }
      function formatPrice(jpy) {
        var c   = state.currency;
        var val = jpy * getRate(c);
        var sym = CUR_SYMBOLS[c] || (c + " ");
        return ZERO_DECIMAL[c] ? sym + Math.round(val).toLocaleString() : sym + val.toFixed(2);
      }

      function getSizeRows(p) {
        var tmpl = sizeTemplates[p.size_template];
        if (!tmpl) return [];
        return Object.keys(tmpl);
      }

      function renderProduct(p) {
        currentProduct = p;
        var imgs = (p.images && p.images.length) ? p.images : [];

        document.title = nameFor(p) + " | TCDA";

        var hero = document.getElementById("product-hero");
        if (imgs[0]) { hero.src = imgs[0]; hero.alt = nameFor(p); }

        /* サムネイル（2枚以上ある場合のみ） */
        var thumbsEl = document.getElementById("product-thumbs");
        thumbsEl.innerHTML = "";
        if (imgs.length > 1) {
          imgs.forEach(function (src, i) {
            var img = document.createElement("img");
            img.src = src; img.alt = nameFor(p) + " " + (i + 1);
            if (i === 0) img.classList.add("active");
            img.addEventListener("click", function () {
              hero.src = src;
              thumbsEl.querySelectorAll("img").forEach(function (t) { t.classList.remove("active"); });
              img.classList.add("active");
            });
            thumbsEl.appendChild(img);
          });
        }

        document.getElementById("product-name").textContent    = nameFor(p);
        document.getElementById("product-concept").textContent = descFor(p);
        document.getElementById("product-material").textContent = p.material || "";
        document.getElementById("product-category").textContent =
          ({tshirt: "Tops", outer: "Outerwear"}[p.category] || p.category || "").toUpperCase();
        document.getElementById("product-price").textContent   = formatPrice(p.price);

        /* サイズ */
        var sizeRow = document.getElementById("size-row");
        sizeRow.innerHTML = "";
        var sizes = getSizeRows(p);
        selectedSize = sizes[0] || null;
        sizes.forEach(function (sz, i) {
          var btn = document.createElement("button");
          btn.className = "size-opt"; btn.type = "button"; btn.textContent = sz;
          btn.setAttribute("aria-pressed", i === 0 ? "true" : "false");
          btn.addEventListener("click", function () {
            sizeRow.querySelectorAll(".size-opt").forEach(function (b) { b.setAttribute("aria-pressed", "false"); });
            btn.setAttribute("aria-pressed", "true"); selectedSize = sz;
          });
          sizeRow.appendChild(btn);
        });

        document.getElementById("product-loading").hidden = true;
        document.getElementById("product-content").hidden = false;
      }

      function updatePriceDisplay() {
        if (!currentProduct) return;
        document.getElementById("product-price").textContent = formatPrice(currentProduct.price);
        document.getElementById("label-currency").textContent = state.currency;
        var sel = document.getElementById("currency-select");
        if (sel) sel.value = state.currency;
      }

      function buyNow() {
        if (!currentProduct) return;
        if (!selectedSize && document.getElementById("size-row").children.length) {
          alert("サイズを選択してください / Please select a size");
          return;
        }
        var code = state.currency;
        var pd   = currentProduct.price * getRate(code);
        var img  = (currentProduct.images && currentProduct.images[0])
          ? location.origin + "/" + currentProduct.images[0] : "";
        var btn = document.getElementById("buy-btn");
        btn.disabled = true; btn.textContent = "…";

        fetch(API + "/api/checkout", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            product_id:    currentProduct.id,
            currency:      code,
            price_display: pd,
            lang:          state.lang,
            size:          selectedSize || "",
            name:          nameFor(currentProduct) + (selectedSize ? " (" + selectedSize + ")" : ""),
            image:         img
          })
        })
        .then(function (r) { return r.json(); })
        .then(function (d) {
          if (d.url) { location.href = d.url; return; }
          alert(d.error || "Checkout error");
          btn.disabled = false; btn.textContent = "Buy Now";
        })
        .catch(function () {
          alert("Network error");
          btn.disabled = false; btn.textContent = "Buy Now";
        });
      }

      document.addEventListener("DOMContentLoaded", function () {
        /* locale panel */
        var lt = document.querySelector("[data-locale-toggle]");
        var lp = document.querySelector("[data-locale-panel]");
        if (lt && lp) {
          lt.addEventListener("click", function (e) {
            e.stopPropagation();
            var open = !lp.hidden;
            lp.hidden = open;
            lt.setAttribute("aria-expanded", String(!open));
          });
          document.addEventListener("click", function () { lp.hidden = true; lt.setAttribute("aria-expanded", "false"); });
          lp.addEventListener("click", function (e) { e.stopPropagation(); });
        }

        document.getElementById("buy-btn").addEventListener("click", buyNow);

        /* 言語切替 */
        document.querySelectorAll("[data-lang-btn]").forEach(function (btn) {
          btn.addEventListener("click", function () {
            state.lang = this.dataset.langBtn;
            try { localStorage.setItem("tcda-lang-v1", state.lang); } catch (e) {}
            document.getElementById("label-lang").textContent = state.lang.toUpperCase();
            if (currentProduct) {
              document.getElementById("product-name").textContent    = nameFor(currentProduct);
              document.getElementById("product-concept").textContent = descFor(currentProduct);
            }
          });
        });

        /* 通貨切替 */
        var currSel = document.getElementById("currency-select");
        if (currSel) {
          currSel.addEventListener("change", function () {
            state.currency = this.value;
            try { localStorage.setItem("tcda-currency-v1", this.value); } catch (e) {}
            updatePriceDisplay();
          });
        }

        var productId = new URLSearchParams(location.search).get("id");
        if (!productId) {
          document.getElementById("product-loading").hidden = true;
          var e = document.getElementById("product-error");
          e.hidden = false; e.textContent = "Product not found.";
          return;
        }

        Promise.all([
          fetch("data/currency.json").then(function (r) { return r.ok ? r.json() : {}; }).catch(function () { return {}; }),
          fetch("data/sizeTemplates.json").then(function (r) { return r.ok ? r.json() : {}; }).catch(function () { return {}; })
        ]).then(function (arr) {
          fxRates       = arr[0];
          sizeTemplates = arr[1];

          /* 通貨セレクト */
          if (currSel && Object.keys(fxRates).length) {
            Object.keys(fxRates).forEach(function (code) {
              var opt = document.createElement("option");
              opt.value = code; opt.textContent = code;
              if (code === state.currency) opt.selected = true;
              currSel.appendChild(opt);
            });
          }

          return fetch(API + "/api/products?ts=" + Date.now())
            .then(function (r) {
              if (!r.ok) throw new Error("HTTP " + r.status);
              return r.json();
            })
            .then(function (data) {
              var p = (data.products || []).find(function (x) { return x.id === productId; });
              if (!p) throw new Error("Product not found: " + productId);
              renderProduct(p);
            });
        }).catch(function (err) {
          console.error("[Product]", err);
          document.getElementById("product-loading").hidden = true;
          var el = document.getElementById("product-error");
          el.hidden = false; el.textContent = err.message;
        });
      });
    })();
    </script>
  </body>
</html>
