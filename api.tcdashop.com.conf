server {
    listen 80;
    listen [::]:80;
    server_name api.tcdashop.com;

    # Certbot が .well-known/acme-challenge を使うために必要
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # HTTP → HTTPS リダイレクト（certbot 実行後に有効化）
    location / {
        return 301 https://$host$request_uri;
    }
}
