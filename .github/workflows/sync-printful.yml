name: Sync Printful Prices

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:        # manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync prices from Printful
        env:
          PRINTFUL_API_KEY: ${{ secrets.PRINTFUL_API_KEY }}
          PRINTFUL_STORE_ID: "17873034"
        run: python3 scripts/sync-from-printful.py

      - name: Commit & push if prices changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/products.json docs/data/products.json
          git diff --staged --quiet && echo "nothing to commit" && exit 0
          git commit -m "chore: sync prices from Printful [automated]"
          git push
